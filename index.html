<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Okul Tanıtımı</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    color:white;
    text-align:center;
    transition: 0.5s;
}

.dark {
    background: #121212;
    color: white;
}

.container {
    margin-top: 80px;
}

img {
    width:120px;
    margin-bottom:20px;
    border-radius: 10px;
}

button {
    width: 85%;
    max-width: 320px;
    padding: 15px;
    margin: 10px;
    font-size: 18px;
    border:none;
    border-radius: 15px;
    background:white;
    color:#333;
    font-weight:bold;
    cursor:pointer;
}

.dark button {
    background:#333;
    color:white;
}
</style>
</head>

<body>

<div class="container">

    <!-- LOGO -->
    <img src="resimler/gumusova.png" alt="Okul Logosu">

    <h1>🏫 Okul Tanıtımı</h1>

    <!-- SES -->
    <audio id="ses" autoplay>
        <source src="muzik/Zeminkat.mp3" type="audio/mpeg">
    </audio>

    <!-- BUTONLAR -->
    <button onclick="play()">▶️ Devam Et</button>
    <button onclick="pause()">⏸️ Durdur</button>
    <button onclick="restart()">🔁 Baştan Dinle</button>
    <button onclick="toggleMode()">🌙 Gece Modu</button>

</div>

<script>
var s = document.getElementById("ses");

function play(){ s.play(); }
function pause(){ s.pause(); }
function restart(){ s.currentTime = 0; s.play(); }

function toggleMode(){
    document.body.classList.toggle("dark");
}
</script>

</body>
</html>
