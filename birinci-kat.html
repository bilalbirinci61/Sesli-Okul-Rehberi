<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1. Kat - Okul Rehberi</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background: linear-gradient(135deg, #11998e, #38ef7d);
    color:white;
    text-align:center;
    transition: 0.4s;
}

/* GECE MODU */
.dark {
    background:#121212;
    color:white;
}

/* LOGO */
.logo {
    width:110px;
    margin-top:20px;
    border-radius:12px;
}

/* BAŞLIK */
h2 {
    margin-top:10px;
}

/* KART */
.card {
    background: rgba(255,255,255,0.15);
    margin: 15px auto;
    padding: 15px;
    width: 90%;
    max-width: 400px;
    border-radius: 15px;
    backdrop-filter: blur(5px);
}

/* BUTONLAR */
button {
    width: 90%;
    max-width: 320px;
    padding: 14px;
    margin: 8px;
    font-size: 16px;
    border:none;
    border-radius: 12px;
    background:white;
    color:#333;
    font-weight:bold;
    cursor:pointer;
}

/* GECE BUTON */
.dark button {
    background:#333;
    color:white;
}

/* PROGRESS BAR */
#barContainer {
    width: 90%;
    max-width: 400px;
    height: 12px;
    background: rgba(255,255,255,0.3);
    margin: 20px auto;
    border-radius: 10px;
    overflow:hidden;
}

#bar {
    height: 100%;
    width: 0%;
    background: yellow;
    transition: 0.2s;
}
</style>
</head>

<body>

<!-- LOGO -->
<img src="resimler/gumusova.png" class="logo">

<h2>🏫 1. Kat Sesli Rehber</h2>

<div class="card">
📍 Otomatik sesli tanıtım başlıyor...  
Aşağıdaki butonlarla kontrol edebilirsiniz.
</div>

<!-- SES -->
<audio id="ses">
    <source src="muzik/birincikat.mp3" type="audio/mpeg">
</audio>

<!-- PROGRESS BAR -->
<div id="barContainer">
    <div id="bar"></div>
</div>

<!-- BUTONLAR -->
<button onclick="playAudio()">▶️ Başlat</button>
<button onclick="pauseAudio()">⏸️ Durdur</button>
<button onclick="restartAudio()">🔁 Baştan</button>
<button onclick="toggleMode()">🌙 Gece Modu</button>

<script>
var audio = document.getElementById("ses");
var bar = document.getElementById("bar");

/* OTOMATİK SES DENEME */
window.onload = function() {
    audio.play().catch(e => {
        console.log("Otomatik ses engellendi:", e);
    });
};

/* SES KONTROL */
function playAudio(){
    audio.play();
}

function pauseAudio(){
    audio.pause();
}

function restartAudio(){
    audio.currentTime = 0;
    audio.play();
}

/* GECE MODU */
function toggleMode(){
    document.body.classList.toggle("dark");
}

/* PROGRESS BAR */
audio.addEventListener("timeupdate", function(){
    let percent = (audio.currentTime / audio.duration) * 100;
    bar.style.width = percent + "%";
});
</script>

</body>
</html>
